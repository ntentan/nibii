name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.4', '8.5']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ntentan_tests
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: pdo, pdo_pgsql, pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Initialize PostgreSQL Database Schema
        run: |
          PGPASSWORD=password psql -h localhost -U postgres -d ntentan_tests -f tests/databases/postgresql.sql

      - name: Run PHPUnit Tests
        env:
          NIBII_DATASTORE: postgresql
          NIBII_HOST: localhost
          NIBII_USER: postgres
          NIBII_PASSWORD: password
          NIBII_DBNAME: ntentan_tests
          NIBII_PDO_DSN: pgsql:host=localhost;dbname=ntentan_tests;user=postgres;password=password
        run: ./vendor/bin/phpunit -c tests/config/travis.xml
